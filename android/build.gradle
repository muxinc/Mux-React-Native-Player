apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'expo-module-gradle-plugin'

group = 'com.mux.reactnativeplayer'
version = '0.1.0'

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
  namespace 'com.mux.reactnativeplayer'
  compileSdkVersion safeExtGet('compileSdkVersion', 36)

  defaultConfig {
    minSdkVersion safeExtGet('minSdkVersion', 23)
    targetSdkVersion safeExtGet('targetSdkVersion', 36)
    versionCode 1
    versionName "0.1.0"
  }
}

repositories {
  google()
  mavenCentral()
  maven { url = uri("https://muxinc.jfrog.io/artifactory/default-maven-release-local") }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "com.mux.player:android:1.5.4"
  // Lock-screen / Now Playing controls. Version tracks the media3 line that
  // MuxPlayer 1.5.x is built on; reconcile with the resolved media3 version if
  // a build surfaces a conflict.
  implementation "androidx.media3:media3-session:${safeExtGet('media3Version', '1.5.1')}"
  implementation "androidx.media3:media3-ui:${safeExtGet('media3Version', '1.5.1')}"
}
